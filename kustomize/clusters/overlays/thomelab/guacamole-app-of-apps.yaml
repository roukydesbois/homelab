apiVersion: v1
kind: Namespace
metadata:
  name: guacamole

---

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: guacamole
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/roukydesbois/homelab
    - oci.trueforge.org/truecharts
  sourceNamespaces:
    - guacamole
  destinations:
    - namespace: guacamole
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: PersistentVolume
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guacamole
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: guacamole
  project: guacamole
  source:
    repoURL: https://github.com/roukydesbois/homelab
    targetRevision: main
    path: kustomize/guacamole/overlays/thomelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
