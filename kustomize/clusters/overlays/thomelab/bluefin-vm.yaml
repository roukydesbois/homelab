# =============================================================================
# Bluefin VM — KubeVirt VM running Bluefin (Universal Blue)
# =============================================================================
#
# Uses a pre-built Bluefin disk image built by the build-bluefin-disk GitHub
# Actions workflow and pushed to GHCR as a KubeVirt ContainerDisk.
#
# User thomas + SSH key are baked into the image via bootc-image-builder
# (bluefin-disk/config.toml). No post-boot setup services needed.
#
# To rebuild the disk image: trigger the build-bluefin-disk workflow manually
# or wait for the weekly Sunday 3am UTC schedule.
#
# DEBUGGING:
#   virtctl console bluefin -n bluefin
#   virtctl vnc bluefin -n bluefin
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: bluefin

---

# -----------------------------------------------------------------------------
# DataVolume — Bluefin disk backed by Longhorn
# CDI imports from the pre-built ContainerDisk image on first apply.
#
# Image: ghcr.io/roukydesbois/bluefin-kubevirt:latest
# Rebuilt weekly by: .github/workflows/build-bluefin-disk.yml
# -----------------------------------------------------------------------------
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: bluefin-disk
  namespace: bluefin
spec:
  source:
    registry:
      url: "docker://ghcr.io/roukydesbois/bluefin-kubevirt:latest"
  pvc:
    storageClassName: longhorn
    accessModes:
      - ReadWriteMany   # Required for LiveMigrate eviction strategy
    resources:
      requests:
        storage: 50Gi

---

# -----------------------------------------------------------------------------
# VirtualMachine — Bluefin VM
#
# Boots directly into Bluefin. User thomas + SSH key are baked into the
# disk image by bootc-image-builder (see bluefin-disk/config.toml).
# cloud-init sets the hostname only.
# -----------------------------------------------------------------------------
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: bluefin
  namespace: bluefin
spec:
  running: true
  template:
    metadata:
      labels:
        app: bluefin
    spec:
      evictionStrategy: LiveMigrate   # Survives node drains / cluster maintenance

      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        memory:
          guest: 8Gi
        resources:
          requests:
            memory: 8Gi
            cpu: "2"
          limits:
            memory: 8Gi
            cpu: "4"
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio   # cloud-init for hostname only
          interfaces:
            - name: default
              masquerade: {}
          inputs:
            - type: tablet
              bus: usb
              name: tablet
          rng: {}   # Kernel entropy source — important for SSH key generation

      networks:
        - name: default
          pod: {}

      volumes:
        - name: rootdisk
          dataVolume:
            name: bluefin-disk

        - name: cloudinit
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: bluefin
