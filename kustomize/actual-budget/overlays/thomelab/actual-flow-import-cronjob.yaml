apiVersion: batch/v1
kind: CronJob
metadata:
  name: actual-flow-import
  namespace: actual-budget
spec:
  # Run daily at 6PM (18:00)
  schedule: "0 18 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: actual-flow-import
            image: node:24-alpine@sha256:01743339035a5c3c11a373cd7c83aeab6ed1457b55da6a69e014a95ac4e4700b
            command:
            - /bin/sh
            - -c
            - |
              cd /tmp
              cp /config/config.json .
              npx @lunchflow/actual-flow import
            volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          volumes:
          - name: config
            secret:
              secretName: actual-flow-config
