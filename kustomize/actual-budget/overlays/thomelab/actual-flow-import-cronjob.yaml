apiVersion: batch/v1
kind: CronJob
metadata:
  name: actual-flow-import
  namespace: actual-budget
spec:
  # Run daily at 6PM (18:00)
  schedule: "0 18 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: actual-flow-import
            image: node:24-alpine@sha256:d1b3b4da11eefd5941e7f0b9cf17783fc99d9c6fc34884a665f40a06dbdfc94f
            command:
            - /bin/sh
            - -c
            - |
              cd /tmp
              cp /config/config.json .
              npx @lunchflow/actual-flow import
            volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          volumes:
          - name: config
            secret:
              secretName: actual-flow-config
