apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - protonmail-bridge-sc.yaml
  - ../../base

patches:
  - patch: |-
      - op: add
        path: /spec/storageClassName
        value: protonmail-bridge-sc
    target:
      group: ""
      version: v1
      kind: PersistentVolumeClaim
      name: protonmail-bridge-pvc 
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: shenxn/protonmail-bridge:3.19.0-build
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: clear-bridge-updates
            image: busybox
            command: ["sh", "-c", "rm -rf /root/.local/share/protonmail/bridge-v3/updates"]
            volumeMounts:
              - name: protonmail-data
                mountPath: /root
    target:
      group: apps
      version: 'v1'
      kind: Deployment
      name: protonmail-bridge-deployment
  - patch: |-
      - op: add
        path: /metadata/annotations
        value:
          tailscale.com/expose: "true"
    target:
      group: ""
      version: v1
      kind: Service
      name: protonmail-bridge
