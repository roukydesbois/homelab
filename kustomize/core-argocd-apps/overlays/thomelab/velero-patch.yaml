apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  source:
    helm:
      valuesObject:
        kubectl:
          image:
            tag: 1.33.4
        initContainers:
        - name: velero-plugin-for-aws
          image: velero/velero-plugin-for-aws:v1.14.0@sha256:7e82f717f44e89671212e0dfce7e061321c386ea84a33bca64a671670ca6c278
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /target
              name: plugins
        configuration:
          backupStorageLocation:
          - name: default
            provider: aws
            bucket: velero
            credential:
              name: credentials-velero
              key: cloud
            config:
              region: garage
              s3Url: "http://192.168.100.210:3900"
              s3ForcePathStyle: "true"
              insecureSkipTLSVerify: "true"
              checksumAlgorithm: ""
          volumeSnapshotLocation:
          - name: default
            provider: aws
            config:
              region: garage
          features: EnableCSI
        credentials:
          useSecret: true
          existingSecret: credentials-velero
        schedules:
          basebackup:
            disabled: false
            labels:
              scheduled-backup: base
            annotations:
              scheduled-backup: base
            schedule: "0 0 * * *"
            template:
              ttl: "336h"
              snapshotVolumes: true
              storageLocation: default
              includedNamespaces:
                - keycloak
                - immich
                - nextcloud
                - thomflix
                - cert-manager
                - hedgedoc
                - protonmail-bridge
                - paperless
                - actual-budget
